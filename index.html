<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-Way Orientation Detector</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; text-align: center; }
    .layout {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      color: white;
    }
    .portrait-primary { background: #27ae60; }
    .portrait-secondary { background: #c0392b; }
    .landscape-primary { background: #2980b9; }
    .landscape-secondary { background: #8e44ad; }
  </style>
</head>
<body>
  <div id="app" class="layout">Detecting...</div>

  <script>
    const app = document.getElementById("app");

    function detectOrientation() {
      let type = "";

      // Modern browsers
      if (screen.orientation && screen.orientation.type) {
        type = screen.orientation.type;
      }
      // iOS Safari fallback
      else if (typeof window.orientation !== "undefined") {
        switch (window.orientation) {
          case 0: type = "portrait-primary"; break;
          case 180: type = "portrait-secondary"; break;
          case 90: type = "landscape-primary"; break;
          case -90: type = "landscape-secondary"; break;
          default: type = "unknown";
        }
      } else {
        type = "unknown";
      }

      // Apply layout
      app.className = `layout ${type}`;
      app.textContent = `Orientation: ${type}`;
    }

    // Listeners
    if (screen.orientation) {
      screen.orientation.addEventListener("change", detectOrientation);
    }
    window.addEventListener("orientationchange", detectOrientation);
    window.addEventListener("resize", detectOrientation);

    // Initial run
    detectOrientation();
  </script>
</body>
</html>
