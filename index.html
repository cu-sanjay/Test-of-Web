<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Screen Orientation Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            transition: background 0.3s;
        }
        header {
            background: #2c3e50;
            color: #fff;
            padding: 1rem;
        }
        main {
            padding: 2rem;
        }
        #output {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 2rem;
            padding: 1rem;
            border: 2px solid #2c3e50;
            display: inline-block;
            background: #ecf0f1;
        }
    </style>
</head>
<body>
    <header>
        <h1>Screen Orientation</h1>
    </header>
    <main>
        <div id="output"></div>
    </main>    

    <script>
        const out = document.getElementById('output');

        function updateOrientation() {
            let orientationType = '';

            if (screen.orientation && screen.orientation.type) {
                orientationType = screen.orientation.type;
            } else if (window.matchMedia("(orientation: portrait)").matches) {
                orientationType = 'portrait';
            } else if (window.matchMedia("(orientation: landscape)").matches) {
                orientationType = 'landscape';
            } else {
                orientationType = 'Not supported';
            }

            switch (true) {
                case orientationType.includes('portrait'):
                    document.body.style.background = '#f39c12';
                    break;
                case orientationType.includes('landscape'):
                    document.body.style.background = '#27ae60';
                    break;
                default:
                    document.body.style.background = '#7f8c8d';
            }

            out.textContent = `Current Orientation: ${orientationType}`;
        }

        if (screen.orientation) {
            screen.orientation.addEventListener('change', updateOrientation);
        }
        window.addEventListener('orientationchange', updateOrientation);
        window.addEventListener('resize', updateOrientation);

        updateOrientation();
    </script>
</body>
</html>
