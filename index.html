<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  font-size: 1.5rem;
  transition: background 0.2s;
  color: white;
}
</style>
</head>
<body>
<div id="output">Move your phone...</div>
<script>
const out = document.getElementById('output');
function handleOrientation(event) {
  const alpha = Math.round(event.alpha);
  const beta = Math.round(event.beta);
  const gamma = Math.round(event.gamma);
  out.textContent = `Alpha: ${alpha}° Beta: ${beta}° Gamma: ${gamma}°`;
  const r = Math.abs(alpha) % 255;
  const g = Math.abs(beta) % 255;
  const b = Math.abs(gamma) % 255;
  document.body.style.background = `rgb(${r},${g},${b})`;
}
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', handleOrientation);
} else {
  out.textContent = 'DeviceOrientation not supported';
}
</script>
</body>
</html>
