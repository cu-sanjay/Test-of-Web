<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  font-size: 2rem;
  color: white;
  transition: background 0.2s;
}
.upright { background: #27ae60; }
.upside { background: #c0392b; }
.land-left { background: #2980b9; }
.land-right { background: #8e44ad; }
</style>
</head>
<body>
<div id="output">Rotate your phone...</div>
<script>
const out = document.getElementById('output');

function detectLayout(beta, gamma) {
  if (beta > 45 && beta < 135) return 'upright';
  if (beta < -45 && beta > -135) return 'upside';
  if (gamma > 45) return 'land-right';
  if (gamma < -45) return 'land-left';
  return 'upright';
}

function handleOrientation(e) {
  const layout = detectLayout(e.beta, e.gamma);
  document.body.className = layout;
  if (layout === 'upright') out.textContent = 'Portrait Upright';
  if (layout === 'upside') out.textContent = 'Portrait Upside Down';
  if (layout === 'land-left') out.textContent = 'Landscape Left';
  if (layout === 'land-right') out.textContent = 'Landscape Right';
}

if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', handleOrientation);
} else {
  out.textContent = 'DeviceOrientation not supported';
}
</script>
</body>
</html>
